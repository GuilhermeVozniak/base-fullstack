pre-commit:
  parallel: true
  commands:
    biome:
      glob: "*.{ts,tsx,js,jsx,json}"
      run: "bunx biome check --write {staged_files}"
      stage_fixed: true
    test_unit:
      run: "bun run test:unit"

pre-push:
  commands:
    test_all:
      run: "bun run test"

commit-msg:
  commands:
    commitlint:
      run: "bunx commitlint --edit {1}"
