name: base-fullstack-prod
services:
  postgres:
    image: postgres:17-alpine
    container_name: base-fullstack_postgres_prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-base-fullstack}
      POSTGRES_USER: ${POSTGRES_USER:-base-fullstack}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-base-fullstack_password}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-base-fullstack} -d ${POSTGRES_DB:-base-fullstack}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: base-fullstack_backend_prod
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-base-fullstack}:${POSTGRES_PASSWORD:-base-fullstack_password}@postgres:5432/${POSTGRES_DB:-base-fullstack}
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:${PORT:-3000}/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
