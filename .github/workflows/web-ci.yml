name: Web CI

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - "packages/**"
      - ".github/workflows/web-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "web/**"
      - "packages/**"
      - ".github/workflows/web-ci.yml"

concurrency:
  group: web-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-web-${{ hashFiles('web/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-web-

      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: web

      - name: Run Biome check
        run: bun run check
        working-directory: web

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache web dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-web-${{ hashFiles('web/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-web-

      - name: Install web dependencies
        run: bun install --frozen-lockfile
        working-directory: web

      - name: Install backend dependencies (for type resolution)
        run: bun install --frozen-lockfile
        working-directory: backend

      - name: Run TypeScript type check
        run: bun run typecheck
        working-directory: web

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-web-${{ hashFiles('web/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-web-

      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: web

      - name: Run unit tests
        run: bun run test
        working-directory: web

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-web-${{ hashFiles('web/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-web-

      - name: Install web dependencies
        run: bun install --frozen-lockfile
        working-directory: web

      - name: Install backend dependencies (for type resolution)
        run: bun install --frozen-lockfile
        working-directory: backend

      - name: Build Next.js
        run: bun run build
        working-directory: web

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-web-${{ hashFiles('web/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-web-

      - name: Install web dependencies
        run: bun install --frozen-lockfile
        working-directory: web

      - name: Install backend dependencies (for type resolution)
        run: bun install --frozen-lockfile
        working-directory: backend

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium
        working-directory: web

      - name: Run Playwright tests
        run: bunx playwright test
        working-directory: web

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 30
